syntax = "proto3";

package kairos.vfs.v1;

service MemoryVFS {
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc Patch(PatchRequest) returns (PatchResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Archive(ArchiveRequest) returns (ArchiveResponse);
}

message ReadRequest {
  string path = 1;
}

message ReadResponse {
  bool success = 1;
  string content = 2;
  string error_msg = 3;
}

message WriteRequest {
  string path = 1;
  string content = 2;
}

message WriteResponse {
  bool success = 1;
  string error_msg = 2;
}

message PatchRequest {
  string path = 1;
  string partial_content = 2;
}

message PatchResponse {
  bool success = 1;
  string error_msg = 2;
}

message SearchRequest {
  string query = 1;
  string scope = 2;
  int32 limit = 3;
  SearchMode mode = 4;
}

enum SearchMode {
  SEARCH_MODE_UNSPECIFIED = 0;
  SEARCH_MODE_SEMANTIC = 1;
  SEARCH_MODE_EXACT = 2;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message SearchResult {
  string session_id = 1;
  repeated float center_vector = 2 [packed = true];
  string abstract_summary = 3;
  repeated ChatMessage messages = 4;
  float score = 5;
}

message ArchiveRequest {
  string session_id = 1;
  string chat_id = 2;
  repeated float centroid_vector = 3 [packed = true];
  string abstract_summary = 4;
  repeated ChatMessage messages = 5;
}

message ArchiveResponse {
  bool success = 1;
  string error_msg = 2;
}

message ChatMessage {
  string user_id = 1;
  string message_id = 2;
  string chat_id = 3;
  string conversation_type = 4;
  string context = 5;
  int64 timestamp = 6;
  MessageMetadata metadata = 7;
  repeated float vector = 8 [packed = true];
}

message MessageMetadata {
  bool is_bot = 1;
  string username = 2;
  string reply_to_message_id = 3;
  string reply_to_user_id = 4;
  bool is_reply_to_me = 5;
  bool is_mention_me = 6;
  repeated string mentions = 7;
}
